<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="login.css" />
</head>
<body>

   <div id="modalOverlay" class="modal-overlay" style="display: none;">
  <div class="modal">
    <h2>Aviso</h2>
    <p id="modalMessage"></p>
    <button type="button" onclick="fecharModal()">Fechar</button>
  </div>
</div>

  <!-- BOTÃO VOLTAR -->
  <button class="voltar-btn" onclick="history.back()">← Voltar</button>

  <main class="login-container">
    <h1>Entrar</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />

 <div class="senha-container" style="position: relative; display: inline-block; width: 250px;">
    <input type="password" id="senha" placeholder="Senha" required 
        style="width: 100%; height: 40px; padding: 0 40px 0 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; outline: none;">
    
    <img 
        src="https://img.icons8.com/material-outlined/24/000000/invisible.png" 
        id="toggleSenhaIcon" 
        alt="Mostrar senha"
        style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 20px; cursor: pointer; opacity: 0.6;"
    >
</div>

      <button type="submit">Entrar</button>
    </form>

    <p>
      Não tem conta?
      <a href="register.html">Criar agora</a>
    </p>
  </main>

  <script src="auth.js"></script>
</body>
</html>
