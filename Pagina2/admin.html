<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI", Arial;
  background:#f1f5f9;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#0d6efd,#4da3ff);
  color:#fff;
  padding:18px 30px;
  font-size:22px;
  font-weight:600;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* CONTAINER */
.container{
  padding:25px;
  max-width:1200px;
  margin:auto;
}

/* LOGIN */
.login-box{
  background:#fff;
  max-width:360px;
  margin:100px auto;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-box input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ddd;
}

.login-box button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* PAINEL */
.painel{
  display:none;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logout{
  background:#dc3545;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* CARDS */
.card{
  background:#fff;
  border-radius:12px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 5px 18px rgba(0,0,0,0.06);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:10px;
  margin-bottom:10px;
}

.label{
  font-size:13px;
  color:#6b7280;
}

.value{
  font-weight:600;
}

/* STATUS BADGE */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
}

.pendente{ background:#fff3cd; color:#856404; }
.pago{ background:#d1e7dd; color:#0f5132; }
.aguardando{ background:#cfe2ff; color:#084298; }
.retirado{ background:#e2e3e5; color:#41464b; }
.cancelado_cliente{ background:#f8d7da; color:#842029; }

/* AÇÕES */
.acoes{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.btn-success{ background:#198754; color:#fff; }
.btn-delete{ background:#dc3545; color:#fff; }

.itens{
  margin-top:8px;
  font-size:14px;
  color:#374151;
}
</style>
</head>
<body>

<header>Painel Administrativo</header>

<div class="container">

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h3>Login Admin</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">

  <div class="top-bar">
    <h2>Pedidos e Reservas</h2>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <div id="listaPedidos"></div>

</div>
</div>

<script>
const API = "http://localhost:3000";

// Elementos do DOM (Cache para performance)
const loginBox = document.getElementById("loginBox");
const painel = document.getElementById("painel");
const listaPedidos = document.getElementById("listaPedidos");

function getToken(){
  return localStorage.getItem("token");
}

function setToken(t){
  localStorage.setItem("token", t);
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

/* LOGIN */
async function login() {
  const emailInput = document.getElementById("email");
  const senhaInput = document.getElementById("senha");

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: emailInput.value, senha: senhaInput.value })
    });

    const data = await res.json();

    if (!res.ok || !data.token) {
      alert(data.error || "Login inválido");
      return;
    }

    setToken(data.token);
    iniciarPainel();
  } catch (err) {
    alert("Erro ao conectar com o servidor.");
  }
}

/* INICIAR */
let intervaloPedidos = null;
function iniciarPainel(){
  loginBox.style.display="none";
  painel.style.display="block";

  carregarPedidos();
  
  // Limpa intervalo anterior se existir para não duplicar
  if(intervaloPedidos) clearInterval(intervaloPedidos);
  intervaloPedidos = setInterval(carregarPedidos, 5000);
}

/* BUSCAR PEDIDOS */
async function carregarPedidos(){
  const token = getToken();
  if(!token) return;

  try {
    const res = await fetch(API + "/pedidos",{
      headers:{ "Authorization":"Bearer " + token }
    });

    // Se o token estiver expirado ou inválido (ERRO 401 ou 403)
    if (res.status === 401 || res.status === 403) {
      console.warn("Sessão expirada. Redirecionando...");
      logout();
      return;
    }

    const response = await res.json();
    
    // Suporte para resposta direta em array ou dentro de .data
    const pedidos = Array.isArray(response) ? response : (response.data || []);

    // SÓ LIMPA A TELA SE TIVER DADOS OU FOR ARRAY VAZIO (Sucesso no Fetch)
    listaPedidos.innerHTML = "";

    if (pedidos.length === 0) {
      listaPedidos.innerHTML = "<p style='text-align:center; padding:20px; color:#666;'>Nenhum pedido encontrado no momento.</p>";
      return;
    }

    pedidos.forEach(p => {
      let itensHtml = "";
      if (p.itens) {
        p.itens.forEach(item => {
          if (item.tamanhos) {
            for (const [tam, qtd] of Object.entries(item.tamanhos)) {
              itensHtml += `<div>• ${item.produto} (${tam} x ${qtd})</div>`;
            }
          }
        });
      }

      const acaoTexto = p.tipo === "RESERVA" ? "Marcar como retirado" : "Marcar como pago";
      const novoStatus = p.tipo === "RESERVA" ? "retirado" : "pago";

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="grid">
          <div><div class="label">ID do Pedido</div><div class="value">${p.pedidoID || p.id}</div></div>
          <div><div class="label">Tipo</div><div class="value">${p.tipo}</div></div>
          <div><div class="label">Status</div><div class="status ${p.status}">${p.status}</div></div>
          <div><div class="label">Nome</div><div class="value">${p.nome}</div></div>
          <div><div class="label">Total</div><div class="value">R$ ${Number(p.total).toFixed(2)}</div></div>
          <div><div class="label">Data</div><div class="value">${p.data ? new Date(p.data).toLocaleString("pt-BR") : "-"}</div></div>
          ${p.tipo !== "RESERVA" ? `
          <div><div class="label">Endereço</div><div class="value">${p.endereco || "-"}</div></div>
          <div><div class="label">Número</div><div class="value">${p.numeroCasa || "-"}</div></div>
          <div><div class="label">Referência</div><div class="value">${p.referencia || "-"}</div></div>
          ` : ""}
        </div>
        <div class="itens">${itensHtml}</div>
        <div class="acoes">
          ${p.status === "cancelado_cliente" 
            ? `<span style="color:#dc3545;font-weight:bold;">Cancelado pelo cliente</span>`
            : `
              ${(p.status === "pendente" || p.status === "aguardando")
                ? `<button class="btn btn-success" onclick="alterarStatus(${p.id}, '${novoStatus}')">${acaoTexto}</button>`
                : ""
              }
              <button class="btn btn-delete" onclick="deletarPedido(${p.id})">Excluir</button>
            `
          }
        </div>
      `;
      listaPedidos.appendChild(card);
    });

  } catch (err) {
    console.error("Erro ao conectar com API de pedidos:", err);
    // Não limpa a lista. Mantém o que estava na tela para não ficar branco.
  }
}

/* ALTERAR STATUS */
async function alterarStatus(id, status){
  const token = getToken();
  try {
    await fetch(`${API}/pedidos/${id}/status`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ status })
    });
    carregarPedidos();
  } catch (err) { alert("Erro ao atualizar status."); }
}

/* DELETAR */
async function deletarPedido(id){
  if(!confirm("Excluir pedido permanentemente?")) return;
  const token = getToken();
  try {
    await fetch(`${API}/pedidos/${id}`, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    carregarPedidos();
  } catch (err) { alert("Erro ao deletar."); }
}

/* AUTO LOGIN */
if(getToken()){
  iniciarPainel();
}
</script>

</body>
</html>
