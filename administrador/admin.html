<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Painel Administrativo</header>

<div class="container">
    <div class="login-box" id="loginBox">
        <h3>Login Admin</h3>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <div class="painel" id="painel">
        <div class="top-bar">
            <h2>Pedidos e Reservas</h2>
            <button class="logout" onclick="logout()">Sair</button>
        </div>
        <div id="listaPedidos"></div>
    </div>
</div>

<div id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#fff; padding:25px; border-radius:12px; text-align:center; min-width:300px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">Confirmação</h3>
        <p id="modalMessage" style="margin-bottom:20px; color:#4b5563;"></p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="btnFecharModalAviso" onclick="fecharModal()" style="padding:10px 20px; border:none; border-radius:6px; cursor:pointer; background:#e2e8f0; font-weight:600;">Fechar</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="painel.js"></script>
</body>
</html>
